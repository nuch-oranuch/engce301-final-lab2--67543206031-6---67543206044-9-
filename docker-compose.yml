services:
  # ==========================================
  # 🗄️ DATABASES (3 ฐานข้อมูลแยกกัน)
  # ==========================================
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ==========================================
  # ⚙️ APPLICATION SERVICES (3 เซอร์วิส)
  # ==========================================
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      DB_HOST: auth-db    # ชี้ไปหา DB ตัวเอง
      DB_USER: admin
      DB_PASSWORD: secretpassword
      DB_NAME: authdb
      PORT: 3001
      JWT_SECRET: my-super-secret-key # 🔑 คีย์นี้ต้องเหมือนกันทุก Service!
    depends_on:
      - auth-db

  task-service:
    build: ./task-service
    ports:
      - "3002:3002"
    environment:
      DB_HOST: task-db    # ชี้ไปหา DB ตัวเอง
      DB_USER: admin
      DB_PASSWORD: secretpassword
      DB_NAME: taskdb
      PORT: 3002
      JWT_SECRET: my-super-secret-key
    depends_on:
      - task-db

  user-service:
    build: ./user-service
    ports:
      - "3003:3003"
    environment:
      DB_HOST: user-db    # ชี้ไปหา DB ตัวเอง
      DB_USER: admin
      DB_PASSWORD: secretpassword
      DB_NAME: userdb
      PORT: 3003
      JWT_SECRET: my-super-secret-key
    depends_on:
      - user-db